<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Office Auth Redirect</title>
  </head>
  <body>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script>
      // This page is used as the redirectUri for MSAL when running as an Office Add-in.
      // It will post the URL (which contains the auth response) back to the Office dialog
      // using Office.context.ui.messageParent when available, otherwise fall back to
      // window.opener.postMessage for non-Office scenarios.

      (function() {
        try {
          var redirectUrl = window.location.href;
          console.log('[Auth Redirect] Processing redirect:', redirectUrl);

          // If we're inside an Office dialog, use messageParent to send the URL back
          if (window.Office && Office.context && Office.context.ui && Office.context.ui.messageParent) {
            try {
              Office.onReady().then(function() {
                console.log('[Auth Redirect] Office ready, sending message to parent');
                Office.context.ui.messageParent(redirectUrl);
              });
            } catch (e) {
              // If Office.onReady isn't available, still attempt to message
              console.warn('[Auth Redirect] Office.onReady failed, trying direct messageParent');
              try { Office.context.ui.messageParent(redirectUrl); } catch (err) { console.error(err); }
            }
          } else if (window.opener && !window.opener.closed) {
            // Fallback for non-Office windows (e.g., browser testing)
            console.log('[Auth Redirect] Using window.opener.postMessage');
            window.opener.postMessage({ type: 'msal.redirect', url: redirectUrl }, '*');
          } else if (window.parent && window.parent !== window) {
            console.log('[Auth Redirect] Using window.parent.postMessage');
            window.parent.postMessage({ type: 'msal.redirect', url: redirectUrl }, '*');
          } else {
            console.log('[Auth Redirect] No parent window found, closing');
          }
        } catch (e) {
          console.error('[Auth Redirect] Error:', e);
        } finally {
          // Close the redirect page after a short delay to ensure message is sent
          setTimeout(function() { 
            console.log('[Auth Redirect] Closing window');
            window.close(); 
          }, 500);
        }
      })();
    </script>
  </body>
</html>

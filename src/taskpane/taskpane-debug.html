<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Word Layouter - Debug</title>
    
    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            padding: 20px;
        }
        .debug-info {
            background: #f0f0f0;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Word Layouter - 调试页面</h2>
    
    <div class="debug-info">
        <h3>加载状态：</h3>
        <p id="office-status">等待 Office 初始化...</p>
        <p id="app-status">等待应用加载...</p>
    </div>
    
    <div id="content">
        <p>正在加载应用...</p>
    </div>
    
    <script>
        // 调试信息
        const log = (msg, isError = false) => {
            console.log(msg);
            const p = document.createElement('p');
            p.textContent = msg;
            p.className = isError ? 'error' : 'success';
            document.getElementById('content').appendChild(p);
        };
        
        log('页面已加载');
        
        // 检查 Office 是否可用
        if (typeof Office !== 'undefined') {
            log('✓ Office 对象已加载');
            
            Office.onReady((info) => {
                document.getElementById('office-status').textContent = '✓ Office 已初始化';
                document.getElementById('office-status').className = 'success';
                
                log(`✓ Office 版本: ${info.host}`);
                log(`✓ 平台: ${info.platform}`);
                
                // 加载主应用
                loadApp();
            });
        } else {
            log('✗ Office 对象未找到', true);
            document.getElementById('office-status').textContent = '✗ Office 未加载';
            document.getElementById('office-status').className = 'error';
        }
        
        function loadApp() {
            document.getElementById('app-status').textContent = '正在加载 React 应用...';
            
            // 检查 container 元素
            const container = document.getElementById('container');
            if (container) {
                log('✓ container 元素已找到');
            } else {
                log('✗ container 元素未找到', true);
            }
            
            // 这里应该加载 React 应用
            // 如果看到这条消息，说明 Office.js 工作正常
            setTimeout(() => {
                document.getElementById('app-status').textContent = '✓ 准备加载 React 应用';
                document.getElementById('app-status').className = 'success';
            }, 500);
        }
    </script>
    
    <!-- React 应用会注入到这里 -->
    <div id="container"></div>
</body>
</html>
